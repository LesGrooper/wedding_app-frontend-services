<div class="wo-layout">
  <!-- HEADER -->
  <header class="wo-header">
    <span class="wo-header__title">💍 Scanner QR</span>
    <nav class="wo-header__nav">
      <a routerLink="/wo/dashboard" class="wo-header__btn">Tamu</a>
      <a routerLink="/wo/search" class="wo-header__btn">Cari</a>
      <a routerLink="/wo/scanner" class="wo-header__btn wo-header__btn--active">Scan</a>
    </nav>
  </header>

  <!-- RESULT FULLSCREEN -->
  <div class="result-screen" [ngClass]="resultClass" *ngIf="state === 'result' && result">
    <div class="result-screen__inner">
      <div class="result-screen__icon">{{ resultIcon }}</div>
      <h2 class="result-screen__label">{{ resultLabel }}</h2>

      <ng-container *ngIf="result.data">
        <div class="result-screen__name">{{ result.data.name }}</div>

        <div class="result-screen__badge" [class.badge--vip]="result.data.category === 'VIP'">
          {{ result.data.category }}
        </div>

        <div class="result-screen__entitlements" *ngIf="resultStatus === 'OK'">
          <div class="entitlement" [class.entitlement--active]="hasEntitlement('FOOD')">
            🍽️ Makan
          </div>
          <div class="entitlement" [class.entitlement--active]="hasEntitlement('SOUVENIR')">
            🎁 Souvenir
          </div>
        </div>
      </ng-container>

      <p class="result-screen__message" *ngIf="resultStatus === 'ALREADY_USED'">
        {{ result.message }}
      </p>

      <button class="btn btn--scan-again" (click)="reset()">Scan Lagi</button>
    </div>
  </div>

  <!-- SCANNER INPUT -->
  <div class="wo-content" *ngIf="state !== 'result'">
    <div class="scanner-card">
      <h2 class="scanner-card__title">Scan QR Tamu</h2>
      <p class="scanner-card__hint">Paste atau ketik QR token tamu, lalu tekan Cek.</p>

      <div class="form__group">
        <label class="form__label">QR Token</label>
        <textarea class="form__input scanner-card__textarea"
          [(ngModel)]="qrInput"
          placeholder="Paste QR token di sini..."
          rows="3"
          [disabled]="state === 'loading'"
          (keydown.enter)="$event.preventDefault(); submitQr()">
        </textarea>
      </div>

      <div class="form__error-global" *ngIf="errorMsg">{{ errorMsg }}</div>

      <button class="btn btn--primary btn--full" (click)="submitQr()"
        [disabled]="!qrInput.trim() || state === 'loading'">
        <span *ngIf="state !== 'loading'">Cek QR</span>
        <span *ngIf="state === 'loading'" class="spinner"></span>
      </button>
    </div>
  </div>
</div>
